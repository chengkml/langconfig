[pytest]
asyncio_mode = strict
asyncio_default_fixture_loop_scope = session
markers =
    slow: tests that run full migration or integration cycles
filterwarnings =
    ignore:Using `TRANSFORMERS_CACHE` is deprecated.*:FutureWarning:transformers.utils.hub
    ignore:Please use `import python_multipart` instead.*:PendingDeprecationWarning:starlette.formparsers
